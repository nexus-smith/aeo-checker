[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/check"
  to = "/.netlify/functions/check"
  status = 200

[[redirects]]
  from = "/api/badge/:score"
  to = "/.netlify/functions/badge?score=:score"
  status = 200
